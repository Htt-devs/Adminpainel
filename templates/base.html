<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KeyBot - {% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar bg-dark text-white p-3" style="width: 250px; min-height: 100vh;">
      <h4 class="text-center mb-4">KeyBot</h4>
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('loja') }}"><i class="fas fa-store"></i> Loja</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('minhas_chaves') }}"><i class="fas fa-key"></i> Minhas Chaves</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('suporte') }}"><i class="fas fa-headset"></i> Suporte</a></li>
      </ul>
      <hr>
      <a href="{{ url_for('logout') }}" class="nav-link text-danger"><i class="fas fa-sign-out-alt"></i> Sair</a>
    </div>

    <!-- Conteúdo principal -->
    <div class="flex-grow-1 p-4">
      <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
