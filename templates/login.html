{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card bg-dark text-white">
      <div class="card-header text-center">
        <h3>Entrar na KeyBot</h3>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control bg-dark text-white" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" name="senha" class="form-control bg-dark text-white" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
        <p class="text-center mt-3">
          Não tem conta? <a href="{{ url_for('register') }}" class="text-info">Criar conta</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
